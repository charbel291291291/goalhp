<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1628" />
  <title>Offline - QuizGoal 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #0a1628; 
      color: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 320px; }
    .logo { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    .gradient { background: linear-gradient(to right, #2563eb, #10b981, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: rgba(255,255,255,0.5); font-size: 0.875rem; line-height: 1.5; margin-bottom: 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    .btn { display: inline-block; padding: 0.75rem 2rem; background: #2563eb; color: white; border-radius: 0.75rem; text-decoration: none; font-weight: 600; }
    .btn:hover { background: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <div class="logo"><span class="gradient">QuizGoal</span></div>
    <h1>You're offline</h1>
    <p>Connect to the internet to play quizzes, make predictions, and earn rewards. Your progress will sync when you're back online.</p>
    <a class="btn" href="/" onclick="window.location.reload()">Try Again</a>
    <p style="margin-top: 2rem; font-size: 0.75rem; color: rgba(255,255,255,0.2);">QuizGoal 2026 by eyedeaz</p>
  </div>
</body>
</html>
